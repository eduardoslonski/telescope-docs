# Wordle: multi-turn interactive word guessing game
# Demonstrates the multi-turn environment loop.
# Install: uv add textarena
#
# Usage: uv run train.py --config configs/examples/example_wordle.yaml

wandb_run_name: "wordle"

model: "Qwen/Qwen2.5-3B"

inference_num_workers: 2
trainer_num_workers: 2

environments:
  - name: "wordle_telescope"
    weight: 1.0
    reward_min: 0.0
    reward_max: 2.2
    kwargs:
      max_turns: 6

prompts_batch_size_for_trainer: 16
group_size: 8
number_of_steps: 300
algorithm: "grpo"

max_model_len: 4096
max_tokens: 2000
